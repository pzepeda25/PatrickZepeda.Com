<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050505" />
      <stop offset="100%" stop-color="#1a0b2e" />
    </linearGradient>
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-magenta" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ff00ff" stroke-width="1" stroke-opacity="0.15"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Abstract shapes -->
  <circle cx="1000" cy="150" r="300" fill="#ff00ff" opacity="0.15" filter="blur(60px)"/>
  <circle cx="200" cy="500" r="350" fill="#00ffff" opacity="0.1" filter="blur(60px)"/>

  <!-- Logo/Monogram -->
  <g transform="translate(100, 100) scale(1.2)">
    <rect width="100" height="100" rx="20" fill="#0a0a0a" stroke="#ffffff" stroke-opacity="0.1" stroke-width="2"/>
    <path d="M35 35 H75 L35 75 H75" fill="none" stroke="#ff00ff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow-magenta)"/>
    <path d="M25 80 V25 H50 C65 25 65 50 50 50 H25" fill="none" stroke="#00ffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow-cyan)"/>
  </g>

  <!-- Text -->
  <text x="100" y="320" font-family="monospace" font-size="24" fill="#ff00ff" letter-spacing="4">SYS.INIT // CREATIVE_TECHNOLOGIST</text>
  <text x="95" y="440" font-family="sans-serif" font-weight="900" font-size="100" fill="#ffffff" letter-spacing="-3">PATRICK ZEPEDA</text>
  
  <text x="100" y="520" font-family="sans-serif" font-weight="900" font-size="40" fill="#00ffff" filter="url(#glow-cyan)">Analog Instinct.</text>
  <text x="450" y="520" font-family="sans-serif" font-weight="900" font-size="40" fill="#ff00ff" filter="url(#glow-magenta)">Digital Precision.</text>
</svg>
